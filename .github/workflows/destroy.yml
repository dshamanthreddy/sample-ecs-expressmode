name: Terraform Destroy (manual)

# Tears down ALL infrastructure. Runs ONLY when triggered by hand from the
# GitHub Actions UI (workflow_dispatch) — never on push. A typed confirmation
# is required so it cannot fire by accident.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm teardown of all resources'
        required: true
        default: ""

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Validate confirmation input
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "::error::Confirmation failed. You must type 'destroy' to proceed."
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with terraform destroy."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -input=false -auto-approve
