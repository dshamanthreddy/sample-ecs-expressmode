name: Terraform Destroy (manual)

# Tears down ALL infrastructure. Runs ONLY when triggered by hand from the
# GitHub Actions UI (workflow_dispatch) — never on push. A typed confirmation
# is required so it cannot fire by accident.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm teardown of all resources'
        required: true
        default: ""

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

# Shares the group with the apply pipeline so a destroy can never run
# concurrently with an apply against the same state.
concurrency:
  group: nginx-ecs-infra
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Validate confirmation input
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "::error::Confirmation failed. You must type 'destroy' to proceed."
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with terraform destroy."

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.2"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -input=false -auto-approve
