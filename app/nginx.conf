server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Health check endpoint used by the ALB target group
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
